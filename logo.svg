<svg viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#946dff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="60" height="60" rx="12" fill="url(#logoGradient)" filter="url(#glow)"/>
    <text x="30" y="42" text-anchor="middle" fill="#ffffff" font-size="32" font-weight="700" font-family="Inter, sans-serif">S</text>
  </g>
  
  <!-- Text -->
  <text x="85" y="45" fill="url(#logoGradient)" font-size="28" font-weight="700" font-family="Inter, sans-serif" letter-spacing="2">
    SOLYANIU
  </text>
  
  <!-- Subtitle -->
  <text x="85" y="65" fill="#6a6a7a" font-size="12" font-family="Inter, sans-serif" letter-spacing="4">
    DEVELOPER
  </text>
</svg>
